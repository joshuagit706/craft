# Supabase local development configuration

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions]
verify_jwt = false
import_map = "functions/import_map.json"

# Regional Auth Functions
[functions."regional-auth-sign-up"]
key = "regional-auth-sign-up"
verify_jwt = false

[functions."regional-auth-sign-in"]
key = "regional-auth-sign-in"
verify_jwt = false

[functions."regional-auth-token-refresh"]
key = "regional-auth-token-refresh"
verify_jwt = false

# Regional Health Check
[functions."regional-health-check"]
key = "regional-health-check"
verify_jwt = false

# Regional Router
[functions."regional-router"]
key = "regional-router"
verify_jwt = false
