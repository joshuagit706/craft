openapi: 3.0.0
info:
  title: CRAFT Platform API
  version: 1.0.0
  description: API for CRAFT - Customizable Rapid Application Framework for Trading

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://craft.app/api
    description: Production server

paths:
  /auth/signup:
    post:
      summary: Create a new user account
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - fullName
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                fullName:
                  type: string
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  session:
                    $ref: '#/components/schemas/Session'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/signin:
    post:
      summary: Sign in an existing user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: User signed in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  session:
                    $ref: '#/components/schemas/Session'
        '400':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/user:
    get:
      summary: Get current authenticated user
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /templates:
    get:
      summary: List all available templates
      tags:
        - Templates
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [dex, defi, payment, asset]
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/Template'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  /templates/{id}:
    get:
      summary: Get detailed information about a template
      tags:
        - Templates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Template details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateDetail'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /deployments:
    get:
      summary: List user deployments
      tags:
        - Deployments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of deployments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Deployment'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /deployments/{id}/analytics:
    get:
      summary: Get analytics data for a deployment
      tags:
        - Analytics
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: metricType
          in: query
          schema:
            type: string
            enum: [page_view, uptime_check, transaction_count]
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  analytics:
                    type: array
                    items:
                      $ref: '#/components/schemas/AnalyticsMetric'
                  summary:
                    $ref: '#/components/schemas/AnalyticsSummary'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Deployment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /payments/checkout:
    post:
      summary: Create a Stripe checkout session
      tags:
        - Payments
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - priceId
                - successUrl
                - cancelUrl
              properties:
                priceId:
                  type: string
                successUrl:
                  type: string
                  format: uri
                cancelUrl:
                  type: string
                  format: uri
      responses:
        '200':
          description: Checkout session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionId:
                    type: string
                  url:
                    type: string
                    format: uri
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        subscriptionTier:
          type: string
          enum: [free, starter, pro, enterprise]
        createdAt:
          type: string
          format: date-time

    Session:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string

    Template:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [dex, defi, payment, asset]
        version:
          type: string
        features:
          type: array
          items:
            type: string
        previewUrl:
          type: string
          format: uri
        thumbnailUrl:
          type: string
          format: uri

    TemplateDetail:
      allOf:
        - $ref: '#/components/schemas/Template'
        - type: object
          properties:
            customizationSchema:
              type: object
            requiredEnvVars:
              type: array
              items:
                type: string
            documentation:
              type: string
              format: uri

    Deployment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [pending, building, completed, failed]
        deploymentUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time

    AnalyticsMetric:
      type: object
      properties:
        id:
          type: string
          format: uuid
        metricType:
          type: string
          enum: [page_view, uptime_check, transaction_count]
        metricValue:
          type: number
        recordedAt:
          type: string
          format: date-time

    AnalyticsSummary:
      type: object
      properties:
        totalPageViews:
          type: integer
        uptimePercentage:
          type: number
        totalTransactions:
          type: integer
        lastChecked:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
        details:
          type: object

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

# ── Webhook Security Requirements ──────────────────────────────────────────────

webhookSecurity:
  description: |
    All webhook endpoints require HMAC-SHA256 signature verification to ensure
    authenticity and prevent unauthorized access.

  signatureVerification:
    algorithm: HMAC-SHA256
    headerName: x-hub-signature-256
    format: "sha256=<hex>"
    example: "sha256=abcd1234efgh5678ijkl9012mnop3456qrst7890uvwx1234yzab5678cdef"

  requiredHeaders:
    - name: x-hub-signature-256
      description: HMAC-SHA256 signature of the request body
      required: true
      example: "sha256=abcd1234..."

    - name: x-github-delivery
      description: Unique delivery ID for replay attack prevention
      required: true
      format: UUID
      example: "12345678-1234-1234-1234-123456789012"

    - name: x-github-hook-installation-target-id
      description: Timestamp of webhook generation
      required: true
      format: Unix timestamp (milliseconds)
      example: "1716806054573"

  securityRequirements:
    - name: Signature Verification
      description: |
        All webhook payloads must be verified using HMAC-SHA256 with the
        configured webhook secret. Requests with invalid signatures must
        return HTTP 401 Unauthorized.

    - name: Replay Attack Prevention
      description: |
        Delivery IDs must be tracked and checked for duplicates. Replayed
        webhooks (same delivery ID) must be rejected with HTTP 401.
        Cache delivery IDs for 24 hours.

    - name: Timestamp Validation
      description: |
        Webhook timestamps must be within ±5 minutes of server time.
        Requests outside this window should be rejected with HTTP 401.

    - name: Error Handling
      description: |
        All security violations must return HTTP 401 Unauthorized, never 500.
        Error messages should not leak implementation details.

  testingGuidelines:
    - |
      Generate valid signatures using:
      HMAC-SHA256(payload, secret) → hex → prepend "sha256="

    - |
      Test replay prevention by sending the same delivery ID twice

    - |
      Test timestamp validation by sending requests with old timestamps

    - |
      Verify that invalid signatures always return 401, not 500

    - |
      Ensure error messages don't reveal the webhook secret or algorithm details
